<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f4f8fb;
color:#0f172a;
}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5');
background-size:cover;
background-position:center;
color:white;
padding:80px 20px;
display:flex;
justify-content:center;
}

.hero-content{
max-width:1100px;
display:flex;
gap:40px;
align-items:center;
}

.hero-text{
flex:1;
}

.hero-text h1{
font-size:40px;
margin-bottom:20px;
}

.hero-text p{
font-size:18px;
}

.hero img{
width:220px;
height:auto;
border-radius:20px;
}

/* BOTON */
.btn{
display:inline-block;
margin-top:20px;
padding:14px 30px;
background:#0ea5e9;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

/* SECCIONES */
section{
max-width:1100px;
margin:auto;
padding:50px 20px;
}

h2{
text-align:center;
margin-bottom:25px;
}

/* GRID SERVICIOS */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

/* CARD */
.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.07);
}

/* 🔥 IMÁGENES CORREGIDAS */
.service-media{
width:100%;
height:260px;
overflow:hidden;
}

.service-media img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
display:block;
}

/* CONTENIDO */
.card-content{
padding:18px;
}

/* BLOQUES */
.box{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

/* CTA */
.cta{
background:#0ea5e9;
color:white;
text-align:center;
padding:50px 20px;
border-radius:20px;
}

/* 🔥 MOBILE FIX REAL */
@media(max-width:768px){

.grid{
grid-template-columns:1fr;
gap:12px;
}

.service-media{
height:200px;
}

.hero{
padding:60px 20px;
}

.hero-text h1{
font-size:28px;
}

.hero-text p{
font-size:16px;
}

}

</style>
